services:
  backend:
    build: ./backend
    container_name: lunchtool-backend
    restart: unless-stopped
    volumes:
      - lunch_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/lunchtool.db
      - TZ=Europe/Amsterdam
      # DEV_EMAIL is only used when Cloudflare header is absent (local dev without CF tunnel)
      # - DEV_EMAIL=dev@example.com
    networks:
      - lunchtool

  frontend:
    build: ./frontend
    container_name: lunchtool
    restart: unless-stopped
    ports:
      - "3045:80"
    depends_on:
      - backend
    networks:
      - lunchtool

volumes:
  lunch_data:

networks:
  lunchtool:
    name: lunchtool
